name: daily-warn-log-analysis

on:
  schedule:
    # 매일 00:30 UTC = 한국시간 오전 9시 30분 (전날치 분석)
    - cron: "30 0 * * *"
  workflow_dispatch: # 버튼으로 수동 실행
    inputs:
      date:
        description: "분석할 날짜 (YYYY-MM-DD, 비우면 어제)"
        required: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install boto3

      - name: Run analyzer
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: gugutalk
          LOG_PREFIX: logs/warn
          REPORT_PREFIX: reports/warn
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python analyze.py --date "${{ github.event.inputs.date }}"
          else
            python analyze.py
          fi
